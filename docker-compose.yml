version: "3.9"

services:
  php:
    image: php:8.2-apache
    container_name: reparaya_php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/000-default.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: reparaya
      DB_USER: reparaya
      DB_PASS: reparaya
    depends_on:
      - mysql
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql mysqli &&
               a2enmod rewrite &&
               apache2-foreground"

  mysql:
    image: mysql:8.0
    container_name: reparaya_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reparaya
      MYSQL_USER: reparaya
      MYSQL_PASSWORD: reparaya
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./sql/reparaya.sql:/docker-entrypoint-initdb.d/01-reparaya.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: reparaya_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  dbdata:
